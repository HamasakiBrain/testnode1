services:
  app:
    build: .
    ports:
      - "3145:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - sqlite-data:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/work-types"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sqlite-data:
